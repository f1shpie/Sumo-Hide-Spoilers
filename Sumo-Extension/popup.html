<!DOCTYPE html>

<html>
<head>
<meta charset="utf-8">
<style>
body {
    font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    width: 220px;
    margin: 0;
    background: #1f1f23;
    color: #e6e6e6
}

.container {
padding: 14px;
}

.title {
font-size: 14px;
font-weight: 600;
margin-bottom: 12px;
}

.toggle {
display: flex;
align-items: center;
justify-content: space-between;
margin-bottom: 14px;
}

.switch {
position: relative;
width: 38px;
height: 20px;
}

.switch input {
opacity: 0;
width: 0;
height: 0;
}

.slider {
position: absolute;
cursor: pointer;
inset: 0;
background-color: #ccc;
border-radius: 20px;
transition: 0.2s;
}

.slider:before {
position: absolute;
content: "";
height: 14px;
width: 14px;
left: 3px;
top: 3px;
background: white;
border-radius: 50%;
transition: 0.2s;
}

input:checked + .slider {
background-color: #4caf50;
}

input:checked + .slider:before {
transform: translateX(18px);
}

.button {
width: 100%;
padding: 8px 10px;
border: none;
border-radius: 6px;
background: #2b7cff;
color: white;
font-size: 13px;
cursor: pointer;
}

.button:hover {
background: #1f63d1;
} </style>

</head>

<body>
<div class="container">

<div class="title"> </div>

<div class="toggle">
<span>Hide spoilers</span>
<label class="switch">
<input type="checkbox" id="toggle">
<span class="slider"></span>
</label>
</div>

<button class="button" id="openBasho">
Open Basho Page
</button>

</div>

<script src="popup.js"></script>

</body>
</html>
